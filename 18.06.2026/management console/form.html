<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./form.css">
    <title>Document</title>
</head>

<body>
    <form>
        <fieldset id="id">
            <label>Order ID (auto)<span>*</span></label>
            <input class='form-control' name='id' type="text" />
            <p class="alert" id="id">empty</p>
        </fieldset>
        <fieldset id="date">
            <label>Order Date<span>*</span></label>
            <input name='phone' type="number" />
            <p class="alert" id="phone">empty</p>
        </fieldset>
        <fieldset id="customer">
            <label>Email <span>*</span> </label>
            <input name="email" type="email" />
            <p class="alert" id="email">empty</p>
        </fieldset>
        <fieldset id="service">
            <label for="service">service <span>*</span> </label>
            <select name="service">
                <option>web development</option>
                <option>pos systems</option>
                <option>cloud services</option>
                <option>mobile app development</option>
            </select>
            <p class="alert" id="service">empty</p>
        </fieldset>
        <fieldset id="note">
            <label for="note">Note <span>*</span> </label>
            <textarea name="note" rows="8"></textarea>
            <p class="alert" id="note">empty</p>
        </fieldset>

        <button id="btn">submit</button>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="./form.js"></script>
</body>

</html>
