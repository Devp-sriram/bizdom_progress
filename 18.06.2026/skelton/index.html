<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Dashboard</title>
</head>

<body class="d-flex">
    <aside class="border-end">
        <div class="d-flex gap-2 align-items-center p-3">
            <i class="fa-solid fa-chart-pie" style="color: var(--brand);"></i>
            <h3 class="m-0 brand-heading">Access Control</h3>
        </div>
        <hr>
        <ul class="list-unstyled p-3" style="width: 200px;">
            <li class="p-2 active"><a data-target="./form.html">Orders</a></li>
            <li class="p-2"><a data-target="./table.html">Users</a></li>
        </ul>
    </aside>

    <main class="w-100">
        <header class="d-flex justify-content-between w-100 px-4 align-items-center">
            <div class="m-0 p-2">
                <h3 class="m-0 brand-heading">Order Management</h3>
                <p class="m-0 text-muted">Manage your orders</p>
            </div>
            <div
                class="icon-avatar m-3 border rounded-circle position-relative d-flex justify-content-center align-items-center">
                <i class="fa-solid fa-user text-light"></i>
                <p class="m-0 small position-absolute top-100 start-50 translate-middle-x">admin</p>
            </div>
        </header>
        <hr class="my-2">
        <iframe src="./form.html" class="w-100"></iframe>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        // Routing by data-target attribute instead of matching link text,
        // so renaming a label never breaks navigation.
        const listItems = document.querySelectorAll('aside ul li');
        const iframe = document.querySelector('iframe');

        listItems.forEach((item) => {
            item.addEventListener('click', () => {
                listItems.forEach((li) => li.classList.remove('active'));
                item.classList.add('active');
                const target = item.querySelector('a').dataset.target;
                iframe.src = target;
            });
        });
    </script>
</body>

</html>
