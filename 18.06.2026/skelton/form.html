<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Add Order</title>
</head>

<body class="p-4">
    <form class="rounded-card border p-4">
        <h4 class="my-2">
            <i class="fa-solid fa-plus rounded-circle bg-dark text-white" style="width: 26px; padding: 5px;"></i>
            Add Order
        </h4>

        <div class="d-flex w-100 gap-4 py-2">
            <div class="form-group w-100">
                <label>Order ID (auto) <span class="text-danger">*</span></label>
                <input name="id" class="form-control rounded-pill-input" disabled />
                <!-- disabled fields are excluded from FormData, so no error paragraph needed here -->
            </div>
            <div class="form-group w-100">
                <label>Order Date <span class="text-danger">*</span></label>
                <input name="date" type="date" class="form-control rounded-pill-input" />
                <p data-error="date" class="text-danger" style="display: none">Date required</p>
            </div>
        </div>

        <div class="d-flex w-100 gap-4 py-2">
            <div class="form-group w-100">
                <label>Customer <span class="text-danger">*</span></label>
                <input name="customer" class="form-control rounded-pill-input" />
                <p data-error="customer" class="text-danger" style="display: none">Customer required</p>
            </div>
            <div class="form-group w-100">
                <label>Store <span class="text-danger">*</span></label>
                <select name="store" class="form-control rounded-pill-input">
                    <option value="">Select Store</option>
                    <option>Karapakkam</option>
                    <option>Sholinganallur</option>
                    <option>Pammal</option>
                </select>
                <p data-error="store" class="text-danger" style="display: none">Store required</p>
            </div>
        </div>

        <div class="d-flex w-100 gap-4 py-2">
            <div class="form-group w-100">
                <label>Total</label>
                <input name="total" type="number" min="0" step="0.01" class="form-control rounded-pill-input" />
                <p data-error="total" class="text-danger" style="display: none">Total required</p>
            </div>
            <div class="form-group w-100">
                <label>Status</label>
                <select name="status" class="form-select rounded-pill-input">
                    <option>Pending</option>
                    <option>Completed</option>
                    <option>Rejected</option>
                </select>
                <p data-error="status" class="text-danger" style="display: none">Status required</p>
            </div>
        </div>

        <div class="d-flex w-100 gap-4 py-2">
            <button type="submit" class="btn btn-brand rounded-pill px-4">Submit</button>
            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" id="resetBtn">Reset</button>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./assets/js/storage.js"></script>
    <script>
        // TODO: practice wiring this up yourself using Storage.getOrders() /
        // Storage.saveOrders() / Storage.getNextOrderId().
        // Match errors with: document.querySelector(`[data-error="${key}"]`)
        // instead of comparing raw ids, so there's no collision risk with
        // ids used elsewhere on the page.
    </script>
</body>

</html>
