<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Login</title>
</head>

<body class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-12 col-md-8 col-lg-6 col-xl-3 rounded bg-light border p-4">
        <form id="login" class="gap-3 d-flex flex-column">
            <h1 class="text-center brand-heading">Login</h1>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter email">
                <p data-error="email" class="text-danger m-2 mb-0" style="display: none;">Email required</p>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Password">
                <p data-error="password" class="text-danger m-2 mb-0" style="display: none;">Password required</p>
            </div>

            <p id="not-found" class="text-danger m-0" style="display: none;">Email or password incorrect</p>

            <button type="submit" class="btn btn-brand w-100 p-2">Submit</button>
            <p class="my-2 text-center">Don't have an account? <a href="./signup.html">Sign up here</a></p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="/storage.js"></script>
    <script>
        // TODO: wire up validation + auth check against Storage.getUsers()
        // Reminder from review: clear each field's own error independently,
        // don't only clear errors inside the "both filled" branch.
    </script>
</body>

</html>
