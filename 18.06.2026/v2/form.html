<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root{
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            height: 80vh;
        }

        label{
            font-size: 14px;
        }
    </style>
    <title>Document</title>
</head>

<body class="p-4">
    <form class="form border p-4" style="border-radius: 20px;">
        <h4 class="my-2"><i class="fa-solid fa-plus rounded-circle bg-dark text-white" style="width: 26px;"></i> Add Order</h4>
        <div class="d-flex w-100 gap-4 py-2">
            <div class="form-group w-100">
                <label>Order ID (auto) <span class="text-danger">*</span></label>
                <input class="form-control rounded-pill" disabled />
            </div>
            <div class="form-group w-100">
                <label>Order Date <span class="text-danger">*</span></label>
                <input type="date" class="form-control rounded-pill" />
            </div>
        </div>
         <div class="d-flex w-100 gap-4 py-2">
            <div class="form-group w-100">
                <label>Customer <span class="text-danger">*</span></label>
                <input class="form-control rounded-pill" />
            </div>
            <div class="form-group w-100">
                <label>Store </label>
                <input class="form-control rounded-pill" />
            </div>
        </div>
         <div class="d-flex w-100 gap-4 py-2">
            <div class="form-group w-100">
                <label>Total</label>
                <input class="form-control rounded-pill" />
            </div>
            <div class="form-group w-100">
                <label>Status</label>
                <select class="form-control rounded-pill">
                    <option>Pending</option>
                    <option>completed</option>
                    <option>Rejected</option>
                </select>
            </div>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
