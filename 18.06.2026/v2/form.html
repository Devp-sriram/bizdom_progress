<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 80vh;
        }

        label {
            font-size: 14px;
        }

        body {
    min-height: 100vh;
    background-color: #f2eefb;
    position: relative;
    overflow: hidden;
}

body::before,
body::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -1;
}

body::before {
    width: 300px;
    height: 300px;
    background: radial-gradient(
        circle,
        rgba(139, 92, 246, 0.4) 0%,
        transparent 70%
    );
    bottom: -100px;
    left: -100px;
}

body::after {
    width: 300px;
    height: 300px;
    background: radial-gradient(
        circle,
        rgba(139, 92, 246, 0.25) 0%,
        transparent 70%
    );
    top: -100px;
    right: -100px;
}
    </style>
    <title>Document</title>
</head>

<body class="p-4">
    <form class="form border p-4" style="border-radius: 20px;">
        <h4 class="my-2"><i class="fa-solid fa-plus rounded-circle bg-dark text-white" style="width: 26px;"></i> Add
            Order</h4>
        <div class="row g-4 mb-3">
            <div class="form-group col-12 col-md-6">
                <label>Order ID (auto) <span class="text-danger">*</span></label>
                <input name='id' class="form-control rounded-pill" disabled />
                <p id='name' class="text-danger" style="display: none">ID required</p>
            </div>
            <div class="form-group col-12 col-md-6">
                <label>Order Date <span class="text-danger">*</span></label>
                <input name='date' type="date" class="form-control rounded-pill" />
                <p id='date' class="text-danger" style="display: none">Date required</p>
            </div>
        </div>
        <div class="row g-4 mb-3">
            <div class="form-group col-12 col-md-6">
                <label>Customer <span class="text-danger">*</span></label>
                <input name='customer' class="form-control rounded-pill" />
                <p id='customer' class="text-danger" style="display: none">Customer required</p>
            </div>
            <div class="form-group col-12 col-md-6">
                <label>Store <span class="text-danger">*</span></label>
                <select name='store' class="form-control rounded-pill">
                    <option value="">Select Store</option>
                    <option>Karapakkam</option>
                    <option>Sholinganallur</option>
                    <option>Pammal</option>
                </select>
                <p id='store' class="text-danger" style="display: none">Store required</p>
            </div>
        </div>
        <div class="row g-4 mb-3">
            <div class="form-group col-12 col-md-6">
                <label>Total</label>
                <input name='total' class="form-control rounded-pill" />
                  <p id='total' class="text-danger" style="display: none">Total required</p>
            </div>
            <div class="form-group col-12 col-md-6">
                <label>Status</label>
                <select name='status' class="form-select rounded-pill">
                    <option>Pending</option>
                    <option>completed</option>
                    <option>Rejected</option>
                </select>
                 <p id='status' class="text-danger" style="display: none">Status required</p>
            </div>
        </div>

        <div class="d-flex w-100 gap-4 py-2">
            <button type="submit" class="btn rounded-pill px-4" style="background-color: #755acf; color: white;">Submit</button>
            <button type="button" class="rounded-pill px-4" onclick="resetForm()">Reset</button>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./router.js"></script>
    <script>
        let uid = JSON.parse(localStorage.getItem('uid')) || 0;
        const orders = JSON.parse(localStorage.getItem('orders')) || [];
        const form = document.querySelector('form');
        const errorList = document.querySelectorAll('.text-danger');
        const id = document.querySelector('input[name="id"]');
        id.value = uid + 1;

        form.addEventListener('submit', (e)=>{
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            if(validate(data)){
                data.id = uid += 1;
                localStorage.setItem('uid', data.id);
                orders.push(data);
                localStorage.setItem('orders', JSON.stringify(orders));
                resetForm()
                window.location.href = 'table.html'
            }

        })

        function resetForm(){
            form.reset()
            errorList.forEach((error)=>{
                error.style.display = 'none'
            })
        }

        function validate(data){
            let isLegit = true
            for(let key in data){
                if(data[key] === ""){
                    errorList.forEach((error)=>{
                        if(error.id === key){
                            error.style.display = 'block'
                        }
                    })
                    isLegit = false
                }
            }
            return isLegit;
        }
    </script>
</body>

</html>
