<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./common.css">
    <style>
        body {
            background-color: #dccfff48;
            min-height: 100vh;
        }

        .active {
            background-color: var(--bs-brand);
            color: white;
            border-radius: 10px;
        }

        form {
            display: none;
        }

        form p {
            display: none;
        }

        #update {
            display: none;
        }

        td{
            min-width: 200px;
        }
    </style>
    <title>Document</title>
</head>

<body class="container">
    <div class="m-2">
        <div class="p-2 ">
            <button onclick='toggleAdd()' class="btn btn-brand rounded-pill"><i class="fa-solid fa-plus "></i> Add
                Employees
            </button>
        </div>
        <form class="form border rounded-5 p-2 mb-5">
            <div class="row p-2">
                <div class="form-group col-12 col-md-6">
                    <label>Employee Id</label>
                    <input name='id' type="text" class="w-100 form-control rounded-pill" placeholder="EMP-....">
                    <p id='id' class="text-danger">Id Required</p>
                </div>
                <div class="form-group col-12 col-md-6">
                    <label>Employee Name</label>
                    <input name='name' type="text" class="w-100 form-control rounded-pill" placeholder="John ...">
                    <p id='name' class="text-danger">Name Required</p>
                </div>
            </div>
            <div class="row p-2">
                <div class="form-group col-12 col-md-6">
                    <label>Department</label>
                    <select name='department' class="w-100 form-select rounded-pill">
                        <option value="">Select a Department</option>
                        <option>Enginnering</option>
                        <option>Sales</option>
                        <option>Marketing</option>
                        <option>HR</option>
                        <option>IT</option>
                    </select>
                    <p id='department' class="text-danger">Department Required</p>
                </div>
                <div class="form-group col-12 col-md-6">
                    <label>Employee Email</label>
                    <input name='email' type="email" class="w-100 form-control rounded-pill"
                        placeholder="john@mail.com">
                    <p id='email' class="text-danger">Email Required</p>
                </div>
            </div>
            <div id="create" class="p-2">
                <button class="btn btn-success rounded-pill">Save</button>
                <button type="button" onclick="resetForm()" class="btn btn-danger border rounded-pill">Reset</button>
            </div>
            <div id="update" class="p-2">
                <button type="button" onclick="updateItem()" class="btn btn-warning rounded-pill">Update</button>
                <button type="button" onclick="resetPrev()" class="btn btn-danger border rounded-pill">Reset</button>
            </div>
        </form>

        <div class="p-2 position-relative">
            <i class="fa-solid fa-plus position-absolute" style="left: 20px; top: 20px;"></i>
            <input id="search" class="border p-2 rounded-pill px-5" placeholder="Search..." />
        </div>

        <table class="table table-hover border rounded-3">
            <thead class="bg-brand">
                <tr>
                    <td>Employee Id</td>
                    <td>Employee Name</td>
                    <td>Department</td>
                    <td>Email</td>
                    <td>Assigned Items</td>
                    <td>Actions</td>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const form = document.querySelector('form');
        const tbody = document.querySelector('tbody');
        const errors = document.querySelectorAll('form p');
        const search = document.getElementById('search');
        const createButtons = document.getElementById('create');
        const updateButtons = document.getElementById('update');

        let isAddOpen = false;
        let idToupdate;
        let employees = JSON.parse(localStorage.getItem('employees')) || []

        render();

        search.addEventListener('input', (e) => {
            const inpValue = e.target.value;
            if (inpValue === "") {
                employees = JSON.parse(localStorage.getItem('employees')) || []
                render()
            }
            employees = employees.filter(emp => emp.name.toLowerCase().includes(inpValue))
            render()
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault()
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            if (validate(data)) {
                employees.push(data)
                localStorage.setItem('employees', JSON.stringify(employees))
                resetForm()
                render()
            }
        })

        function toggleAdd() {
            if (isAddOpen) {
                form.style.display = 'none'
                isAddOpen = false
            } else {
                form.style.display = 'block'
                isAddOpen = true
            }
        }

        function validate(data) {
            let isLegit = true
            for (let feild in data) {
                if (data[feild] === '') {
                    isLegit = false
                    errors.forEach(err => err.id === feild ? err.style.display = 'block' : "")
                }
            }
            return isLegit
        }

        function resetForm() {
            form.reset()
            errors.forEach(err => err.style.display = 'none')
        }

        function render() {
            tbody.innerHTML = ''
            employees.forEach(emp => {
                const tr = document.createElement('tr');
                let itemText = '';
                emp.items ? emp.items.forEach(item => itemText += `<li class='p-2 m-2 bg-brand rounded-pill'>${item}</li>`) : ""
                tr.innerHTML = `
                    <td>${emp.id}</td>
                    <td>${emp.name}</td>
                    <td>${emp.department}</td>
                    <td>${emp.email}</td>
                    <td>
                        <ul class='list-unstyled'>
                        ${itemText ? itemText : '-'}
                        </ul>
                    </td>
                    <td> 
                        <button type="button" onclick="updateItemOpen(${emp.id})" class="btn btn-warning rounded-pill"><i class="fa-solid fa-pencil"></i> Edit</button>
                        <button type="button" onclick="deleteItem(${emp.id})" class="btn btn-danger border rounded-pill"><i class="fa-solid fa-trash"></i> Delete</button>
                    </td> 
                `
                tbody.appendChild(tr)
            })
        }

        function updateItemOpen(id) {
            idToupdate = id
            createButtons.style.display = 'none'
            updateButtons.style.display = 'block'
            const inputs = document.querySelectorAll('form input')
            const selects = document.querySelectorAll('form select')
            const data = employees.find(emp => emp.id === String(id))
            toggleAdd();
            // inputs.forEach(input => console.log(input))
            // selects.forEach(select => console.log(select))
            inputs.forEach(input => input.value = data[input.name])
            selects.forEach(select => select.value = data[select.name])
        }

        function resetPrev() {
            const inputs = document.querySelectorAll('form input')
            const selects = document.querySelectorAll('form select')
            const data = employees.find(emp => emp.id === String(idToupdate))
            errors.forEach(err => err.style.display = 'none')
            inputs.forEach(input => input.value = data[input.name])
            selects.forEach(select => select.value = data[select.name])
        }

        function updateItem() {
            const formData = new FormData(form)
            const data = Object.fromEntries(formData.entries());
            if (validate(data)) {
                employees = employees.map(emp => emp.id === String(idToupdate) ? { ...emp, ...data } : emp)
                localStorage.setItem('employees', JSON.stringify(employees))
                createButtons.style.display = 'block'
                updateButtons.style.display = 'none'
                idToupdate = null
                toggleAdd();
                render()
            }
        }

        function deleteItem(id) {
            employees = employees.filter(emp => emp.id != String(id))
            localStorage.setItem('employees', JSON.stringify(employees))
            render()
        }

    </script>
</body>

</html>
