<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./common.css">
    <style>
        body{
            background-color: #dccfff48;
            min-height: 100vh;
        }
        .active {
            background-color: var(--bs-brand);
            color: white;
            border-radius: 10px;
        }
    </style>
    <title>Document</title>
</head>

<body class="container">
    <div class="row m-2 rounded-5">
        <div class="col-11 col-md-3 card m-3"">
            <div class="card-body">
                <h5 class="card-title">Employees</h5>
                <p id="empCount" class="card-text"></p>
                <a href="./employee.html" class="btn btn-info"><i class="fa-solid fa-arrow-right"></i></a>
            </div>
        </div>
        <div class="col-11 col-md-3 card m-3">
            <div class="card-body">
                <h5 class="card-title">Asserts</h5>
                <p id="assCount" class="card-text"></p>
                <a href="./assert.html" class="btn btn-info"><i class="fa-solid fa-arrow-right"></i></a>
            </div>
        </div>
        <div class="col-11 col-md-3 card m-3">
            <div class="card-body">
                <h5 class="card-title">Assigned</h5>
                <p id="assinCount" class="card-text"></p>
                <a href="./assert.html" class="btn btn-info"><i class="fa-solid fa-arrow-right"></i></a>
            </div>
        </div>
        <div class="col-11 col-md-3 card m-3" ">
            <div class="card-body">
                <h5 class="card-title">Available</h5>
                <p id="availCount" class="card-text"></p>
                <a href="./assert.html" class="btn btn-info"><i class="fa-solid fa-arrow-right"></i></a>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


    <script>
        const empCount = document.getElementById('empCount');
        const assCount = document.getElementById('assCount');
        const assinCount = document.getElementById('assinCount');
        const availCount = document.getElementById('availCount');


        let asserts = JSON.parse(localStorage.getItem('asserts')) || []
        let employees = JSON.parse(localStorage.getItem('employees')) || []
        let assinged = asserts.reduce((acc, emp) => {
            emp.status == "Assigned" ? acc +=1 :""
            return acc;
        }, 0);

        let available = asserts.reduce((acc, emp) => {
            emp.status == "Available" ? acc++ :""
            return acc;
        }, 0);
        empCount.textContent = employees.length;
        assCount.textContent = asserts.length;
        assinCount.textContent = assinged
        availCount.textContent = available

    </script>
</body>

</html>
