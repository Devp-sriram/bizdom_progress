        <div class="p-2 ">
            <input id="search" class="border p-2 rounded-pill px-5" placeholder="Search..." />
        </div>

        <table class="table table-hover border">
            <thead>
                <tr>
                    <td>Assert Id</td>
                    <td>Assert Name</td>
                    <td>Category</td>
                    <td>Status</td>
                    <td>Assigned To</td>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const form = document.querySelector('form');
        const tbody = document.querySelector('tbody');
        const errors = document.querySelectorAll('form p');
        const search = document.getElementById('search');
        const createButtons = document.getElementById('create');
        const updateButtons = document.getElementById('update');
        const items = document.getElementById('items');
        const modal = document.getElementById('exampleModal');
        const cardContainer = document.getElementById('cardContainer')

        let isAddOpen = false;
        let idToupdate;
        let asserts = JSON.parse(localStorage.getItem('asserts')) || []
        let employees = JSON.parse(localStorage.getItem('employees')) || []

        render();
        AddOptions()

        function AddOptions() {
            employees.forEach(emp => {
                const option = document.createElement('option')
                option.textContent = `${emp.id}-${emp.name}`
                items.appendChild(option)
            })
        }

        search.addEventListener('input', (e) => {
            const inpValue = e.target.value.toLowerCase();
            if (inpValue === "") {
                asserts = JSON.parse(localStorage.getItem('asserts')) || []
                render()
            }
            asserts = asserts.filter(emp => emp.name.toLowerCase().includes(inpValue))
            render()
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault()
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            if (validate(data)) {
                const modalInstance = bootstrap.Modal.getInstance(modal);
                modalInstance.hide();
                if (data.item != 'keep available') {
                    console.log(data.item)
                    data.status = 'Assigned';
                    console.log(data.status)
                    const [id, name] = data.item.split('-');
                    const emp = employees.find(emp => emp.id == id);
                    console.log(emp)
                    emp.items ? emp.items.push(`${data.id}-${data.name}`) : emp.items = [`${data.id}-${data.name}`]
                    employees = employees.map(employee => employee.id === id ? emp : employee)
                    localStorage.setItem('employees', JSON.stringify(employees))
                } else {
                    data.status = 'Available';
                }

                asserts.push(data)
                localStorage.setItem('asserts', JSON.stringify(asserts))
                resetForm()
                render()
            }
        })

        function toggleAdd() {
            if (isAddOpen) {
                form.style.display = 'none'
                isAddOpen = false
            } else {
                form.style.display = 'block'
                isAddOpen = true
            }
        }

        function validate(data) {
            let isLegit = true
            for (let feild in data) {
                if (data[feild] === '') {
                    isLegit = false
                    errors.forEach(err => err.id === feild ? err.style.display = 'block' : "")
                }
            }
            return isLegit
        }

        function resetForm() {
            form.reset()
            errors.forEach(err => err.style.display = 'none')
        }

        function render() {
            tbody.innerHTML = ''
            asserts.forEach(emp => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${emp.id}</td>
                    <td>${emp.name}</td>
                    <td>${emp.category}</td>
                    <td>${emp.status}</td>
                    <td>${emp.item}</td>
                    <td> 
                        <button type="button" onclick="updateItemOpen(${emp.id})" class="btn btn-warning rounded-pill"><i class="fa-solid fa-pencil"></i> Edit</button>
                        <button type="button" onclick="deleteItem(${emp.id})" class="btn btn-danger border rounded-pill"><i class="fa-solid fa-trash"></i> Delete</button>
                    </td> 
                `
                tbody.appendChild(tr)
            })

            cardContainer.innerHTML = ''
            asserts.forEach(emp => {
                const div = document.createElement('div');
                div.classList.add('card')
                div.classList.add('p-3')
                div.innerHTML = `
                    <h4>${emp.id}-${emp.name}</h4>
                    <p>${emp.category}</p>
                    <div class='d-flex gap-2 mb-3'>
                         <div class='badge bg-brand p-3'>${emp.status}</div>
                         <h3 class='my-2'>${emp.item}</h3>
                    </div>
                    <div> 
                        <button type="button" onclick="updateItemOpen(${emp.id})" class="btn btn-warning rounded-pill"><i class="fa-solid fa-pencil"></i> Edit</button>
                        <button type="button" onclick="deleteItem(${emp.id})" class="btn btn-danger border rounded-pill"><i class="fa-solid fa-trash"></i> Delete</button>
                    </div> 
                `
                cardContainer.appendChild(div)
            })
        }

        function updateItemOpen(id) {
            idToupdate = id
            const modalInstance = new bootstrap.Modal(modal);
            modalInstance.show();
            createButtons.style.display = 'none'
            updateButtons.style.display = 'block'
            const inputs = document.querySelectorAll('form input')
            const selects = document.querySelectorAll('form select')
            const data = asserts.find(emp => emp.id === String(id))
            // toggleAdd();
            // inputs.forEach(input => console.log(input))
            // selects.forEach(select => console.log(select))
            inputs.forEach(input => input.value = data[input.name])
            selects.forEach(select => select.value = data[select.name])
        }

        function resetPrev() {
            const inputs = document.querySelectorAll('form input')
            const selects = document.querySelectorAll('form select')
            const data = asserts.find(emp => emp.id === String(idToupdate))
            errors.forEach(err => err.style.display = 'none')
            inputs.forEach(input => input.value = data[input.name])
            selects.forEach(select => select.value = data[select.name])
        }

        function updateItem() {
            const formData = new FormData(form)
            const data = Object.fromEntries(formData.entries());
            const existData = asserts.find(as => as.id === String(idToupdate))

            // update logic
            // if(data.item !== existData.item){
            //     const [id ,name] = existData.item.split('-');
            //     const emp = employees.find(emp => emp.id == id);
            //     console.log(emp)
            //     emp.items.filter(item=> item != data.item)
            //     employees = employees.map(employee => employee.id === id ? emp : employee)
            //     localStorage.setItem('employees', JSON.stringify(employees))
            //     render()
            // }

            if (validate(data)) {
                const modalInstance = bootstrap.Modal.getInstance(modal);
                modalInstance.hide();
                if (data.item != 'keep available') {
                    console.log(data.item)
                    data.status = 'Assigned';
                    console.log(data.status)
                    const [id, name] = data.item.split('-');
                    const emp = employees.find(emp => emp.id == id);
                    console.log(emp)
                    emp.items ? emp.items.push(`${data.id}-${data.name}`) : emp.items = [`${data.id}-${data.name}`]
                    employees = employees.map(employee => employee.id === id ? { ...employee, ...emp } : employee)
                    localStorage.setItem('employees', JSON.stringify(employees))
                } else {
                    data.status = 'Available';
                }


                asserts = asserts.map(emp => emp.id === String(idToupdate) ? { ...emp, ...data } : emp)
                localStorage.setItem('asserts', JSON.stringify(asserts))
                createButtons.style.display = 'block'
                updateButtons.style.display = 'none'
                idToupdate = null
                toggleAdd();
                render()
            }
        }

        function deleteItem(id) {
            asserts = asserts.filter(emp => emp.id != String(id))
            localStorage.setItem('asserts', JSON.stringify(asserts))
            render()
        }

    </script>
