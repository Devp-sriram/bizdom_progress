<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./common.css">
    <style>
        iframe {
            min-height: 100vh;
        }

        .active {
            background-color: var(--bs-brand);
            color: white;
            border-radius: 10px;
        }

        #destopNav {
            display: none;
        }

        @media screen and (width > 768px) {
            #destopNav {
                display: block;
            }
        }
    </style>
    <title>Document</title>
</head>

<body class="row">
    <header class="col-12 border py-3">
        <div class="row">
            <div class="col-1 text-brand p-0">
                <i class="fa-regular fa-user fa-lg mx-4 rounded-circle shadow"></i>
                <p id="user" class="mx-3 my-0">Admin</p>
            </div>
            <div class="col-10 p-0">
                <div class="d-flex justify-content-center align-items-center">
                    <h3 class="text-brand px-auto my-2">Assert Manager</h3>
                </div>
            </div>
            <div class="col-1 text-brand p-0">
                <a data-bs-toggle="offcanvas" href="#offcanvasExample" role="button" aria-controls="offcanvasExample">
                    <i class="fa-solid fa-bars fa-lg my-4"></i>
                </a>
            </div>
        </div>
    </header>
    <div class="col-12">
        <!-- Mobile nav Bar -->
        <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample"
            aria-labelledby="offcanvasExampleLabel">
            <div class="offcanvas-header">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <ul class="list-unstyled">
                    <li class="w-100 p-2 active" data-bs-dismiss="offcanvas">Dasboard</li>
                    <li class="w-100 p-2" data-bs-dismiss="offcanvas">Employees</li>
                    <li class="w-100 p-2" data-bs-dismiss="offcanvas">Asserts</li>
                </ul>
            </div>
        </div>


        <div class="row">
            <aside id="destopNav" class="col-0 col-md-3 col-xxl-2 p-0">
                <ul class="list-unstyled m-4">
                    <li class="w-100 p-2 active">Dasboard</li>
                    <li class="w-100 p-2">Employees</li>
                    <li class="w-100 p-2">Asserts</li>
                </ul>
            </aside>
            <div class="col-12 col-md-9 col-xxl-10 p-0">
                <iframe src="/dashboard.html" width="100%" height="100%"></iframe>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const navLinks = document.querySelectorAll('ul li');
        const iframe = document.querySelector('iframe');
        navLinks.forEach(nav => {
            nav.addEventListener('click', () => {
                navLinks.forEach(nav => nav.classList.remove('active'));
                nav.classList.add('active')

                if (nav.textContent.trim() === 'Dasboard') {
                    iframe.src = '/dashboard.html'
                } else if (nav.textContent.trim() === 'Employees') {
                    iframe.src = '/employee.html'
                } else {
                    iframe.src = '/assert.html'
                }
            })
        })
    </script>
</body>

</html>
