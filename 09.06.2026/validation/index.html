<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>

<body>
    <form>
        <fieldset id="name">
            <label>Name <span>*</span></label>
            <input name='name' type="text" />
            <p class="alert" id="name">empty</p>
        </fieldset>
        <fieldset id="phone">
            <label>Phone <span>*</span></label>
            <input name='phone' type="number" />
            <p class="alert" id="phone">empty</p>
        </fieldset>
        <fieldset id="email">
            <label>Email <span>*</span> </label>
            <input name="email" type="email" />
            <p class="alert" id="email">empty</p>
        </fieldset>
        <fieldset id="service">
            <label for="service">service <span>*</span> </label>
            <select name="service">
                <option>web development</option>
                <option>pos systems</option>
                <option>cloud services</option>
                <option>mobile app development</option>
            </select>
            <p class="alert" id="service">empty</p>
        </fieldset>
        <fieldset id="note">
            <label for="note">Note <span>*</span> </label>
            <textarea name="note" rows="8"></textarea>
            <p class="alert" id="note">empty</p>
        </fieldset>

        <button id="btn">submit</button>
    </form>
    <script src="./script.js"></script>
</body>

</html>
