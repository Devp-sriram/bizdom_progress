<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body class="d-flex justify-content-center align-items-center text-light">
    <div class="container" style="height: fit-content;">
        <div class="row">
            <div class="col-12 col-md-6 border" data-toggle="tooltip">column 1</div>
            <div class="col-12 col-md-6 border" data-toggle="tooltip">column 2</div>
        </div>

        <div class="row">
            <div class="col-12 border" data-toggle="tooltip">column 3</div>
        </div>

        <div class="row">
            <div class="col-12 border" data-toggle="tooltip">column 4</div>
        </div>

        <div class="row">
            <div class="col-12 border" data-toggle="tooltip">column 5</div>
        </div>

        <div class="row">
            <div class="col-12 col-md-3 border" data-toggle="tooltip">column 6</div>
            <div class="col-12 col-md-3 border">column 7</div>
            <div class="col-12 col-md-3 border">column 8</div>
            <div class="col-12 col-md-3 border">column 9</div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous">
        </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
    <script>
        const colums = document.querySelectorAll('[data-toggle="tooltip"]')
        colums.forEach(col => new bootstrap.Tooltip(col))
        console.log()
    </script>
</body>

</html>
