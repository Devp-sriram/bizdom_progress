<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" href='./style.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Signin</title>
</head>

<body class="container-lg mx-auto d-flex justify-content-center align-items-center row">
    <div class="col-12 col-md-8 col-lg-6 col-xl-3 rounded- bg-light border active h-full p-4">
        <form id="signin" class="gap-3 d-flex flex-column">
            <h1 class="text-center">Sign in</h1>
            <div class="form-group">
                <label for="name">Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" aria-describedby="nameHelp"
                    placeholder="Enter name">
                <p id="nameError" class="text-danger m-2" style="display: none;"> Name Required</p>
            </div>
            <div class="form-group">
                <label for="email">Email address <span class="text-danger">*</span></label>
                <input type="email" class="form-control" name="email" aria-describedby="emailHelp"
                    placeholder="Enter email">
                <p id="emailError" class="text-danger m-2" style="display: none;"> email Required</p>
            </div>
            <div class="form-group position-relative">
                <label for="password">Password <span class="text-danger">*</span></label>
                <input id='password' type="password" class="form-control" name="password" placeholder="Password">
                <span id="eye" class="position-absolute" onclick="togglePassword()">
                    <svg xmlns="http://www.w3.org/2000/svg" width='25' height='25'
                        viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
                        <path
                            d="M320 96C239.2 96 174.5 132.8 127.4 176.6C80.6 220.1 49.3 272 34.4 307.7C31.1 315.6 31.1 324.4 34.4 332.3C49.3 368 80.6 420 127.4 463.4C174.5 507.1 239.2 544 320 544C400.8 544 465.5 507.2 512.6 463.4C559.4 419.9 590.7 368 605.6 332.3C608.9 324.4 608.9 315.6 605.6 307.7C590.7 272 559.4 220 512.6 176.6C465.5 132.9 400.8 96 320 96zM176 320C176 240.5 240.5 176 320 176C399.5 176 464 240.5 464 320C464 399.5 399.5 464 320 464C240.5 464 176 399.5 176 320zM320 256C320 291.3 291.3 320 256 320C244.5 320 233.7 317 224.3 311.6C223.3 322.5 224.2 333.7 227.2 344.8C240.9 396 293.6 426.4 344.8 412.7C396 399 426.4 346.3 412.7 295.1C400.5 249.4 357.2 220.3 311.6 224.3C316.9 233.6 320 244.4 320 256z" />
                    </svg>
                </span>

                <p id="passwordError" class="text-danger m-2" style="display: none;"> password Required</p>
            </div>
            <div>
                <button type="submit" class="btn btn-primary w-100 p-2">Submit</button>
                <p class="my-2">Already have a account <a href="./login.html">Login here</a></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
    <script>
        const signinForm = document.getElementById('signin');

        //errors
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');

        const users = JSON.parse(localStorage.getItem('userData')) || [];

        function togglePassword() {
            var x = document.getElementById("password");
            if (x.type === "password") {
                x.type = "text";
            } else {
                x.type = "password";
            }
        }

        signinForm.addEventListener('submit', (e) => {
            e.preventDefault()
            const formData = new FormData(signinForm)
            const userData = Object.fromEntries(formData.entries())

            if (userData.name === "") {
                nameError.style.display = 'block'
            }
            if (userData.email === "") {
                emailError.style.display = 'block'
            }
            if (userData.password === "") {
                passwordError.style.display = 'block'
            }
            if (userData.name && userData.email && userData.password) {
                users.push(userData)
                localStorage.setItem('userData', JSON.stringify(users))
                setTimeout(() => {
                    window.location.href = '/login.html'
                }, 1000)
            }
        })
    </script>
    <script src="
https://cdn.jsdelivr.net/npm/browser-scss@1.0.3/dist/browser-scss.min.js
"></script>


</body>

</html>
