<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./table.css">
    <title>Table</title>
</head>

<body class="container-lg mx-auto d-flex justify-content-center align-items-center row">
    <header class="min-vw-100">
        <h1>
            Order management dashboard
        </h1>
        <div class="welcome">
            Welcome, <p id="username"></p>
            <button class="btn d-none d-md-block" onclick="logout()">Logout</button>
        </div>

        <button id="toggle-table">Show Table</button>
        <button id="toggle-form">Show form</button>
       
    </header>
     <div class="dropdown">
            <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenu2" data-bs-toggle="dropdown"
                aria-expanded="false">
                <!-- <i class="fa-solid fa-user"></i> -->
                 eqlfp
            </button>
            <ul class="dropdown-menu" aria-labelledby="dropdownMenu2">
                <li><button class="dropdown-item" type="button">Action</button></li>
                <li><button class="dropdown-item" type="button">Another action</button></li>
                <li><button class="dropdown-item" type="button">Something else here</button></li>
            </ul>
        </div>
    <form id="container">

        <label>Reciptent Name <span>*</span> </label>
        <input name="name" type="text" />
        <p class="error" id="name">name is required</p>

        <label>Amount <span>*</span> </label>
        <input name="amount" type="number" />
        <p class="error" id="amount">Amount is required</p>

        <label>Payment Method <span>*</span> </label>
        <input name="method" type="text" />
        <p class="error" id="method">Payment method is required</p>

        <label>payment Status <span>*</span> </label>
        <select name="status">
            <option value="">Select Status</option>
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
        </select>
        <p class="error" id="status">Payment status is required</p>

        <div class="btncontainer">
            <button id='clear' type="button" onclick="clear()">clear</button>
            <button id='submit' type="submit">Submit</button>
        </div>

        <div class="btncontainer">
            <button id="reset" type="button"> Reset</button>
            <button id="update" type="button">
                <svg width="12px" height="12px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <g>
                        <path fill="none" d="M0 0h24v24H0z" />
                        <path
                            d="M15.728 9.686l-1.414-1.414L5 17.586V19h1.414l9.314-9.314zm1.414-1.414l1.414-1.414-1.414-1.414-1.414 1.414 1.414 1.414zM7.242 21H3v-4.243L16.435 3.322a1 1 0 0 1 1.414 0l2.829 2.829a1 1 0 0 1 0 1.414L7.243 21z" />
                    </g>
                </svg>
                Update
            </button>
        </div>

    </form>
    <div class="wrapper">
        <table id="table">
            <tr class="table-head">
                <td>Reciptent Name</td>
                <td>Amount</td>
                <td>Payment Method</td>
                <td>Payment Status</td>
                <td>Action</td>
            </tr>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>


    <script src="./script.js"></script>
    <script>
        const dropdown = document.querySelector('.dropdownMenu2');
        const toggleTableButton = document.getElementById('toggle-table');
    </script>
</body>

</html>
