<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>Document</title>
</head>

<body>
  <div id="carouselExampleIndicators" class="carousel slide w-75" data-ride="carousel">
    <ol class="carousel-indicators">
      <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
      <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
      <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
    </ol>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img class="d-block w-100"
          src="https://www.digitalphotomentor.com/photography/2015/05/wide-angle-lenses-750px-01.jpg" alt="First slide">
      </div>
      <div class="carousel-item">
        <img class="d-block w-100"
          src="https://images.squarespace-cdn.com/content/v1/6384b721bfb9485af63846fb/cdc2fe22-e9b6-4244-be40-6dd905d4af8f/wide-angle-lens-photography-composition-25.jpg?format=2500w"
          alt="Second slide">
      </div>
      <div class="carousel-item ">
        <img class="d-block w-100"
          src="https://images.squarespace-cdn.com/content/v1/6384b721bfb9485af63846fb/b7dfe523-cccf-49aa-aefd-5e20f6a790f5/wide-angle-lens-photography-composition-1.jpg?format=2500w"
          alt="Third slide">
      </div>
    </div>
    <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="sr-only">Previous</span>
    </a>
    <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="sr-only">Next</span>
    </a>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>


  <script>
    const imgArr = document.querySelectorAll(".carousel-item");
    let idx = 0
      setInterval(() => {
        imgArr.forEach(img=> img.classList.remove('active'))
        imgArr[idx % 3].classList.add('active')
        console.log(idx % 3)
        idx++
      }, 1500)
  </script>
</body>

</html>
