<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./common.css">
    <style>
        form p {
            display: none;
        }
    </style>
    <title>Document</title>
</head>

<body>
    <form class="form m-3 p-3 border rounded-5">
        <h3 class="mb-0"><i class="fa-solid fa-plus bg-dark rounded-circle" style="color: rgb(255, 255, 255);"></i>
            Create order</h3>
        <div class="row mb-3">
            <div class="form-group col-12 col-md-6">
                <label>Order Id</label>
                <input id='id' name="id" type="text" class="form-control" disabled>
            </div>
            <div class="form-group col-12 col-md-6">
                <label>Order date</label>
                <input name="date" type="date" class="form-control col-12 col-md-6">
                <p id="date" class="text-danger">Date Required</p>
            </div>
        </div>
        <div class="row mb-3">
            <div class="form-group col-12 col-md-6">
                <label>Customer name</label>
                <input name="name" type="text" class="form-control">
                <p id="name" class="text-danger">Name Required</p>
            </div>
            <div class="form-group col-12 col-md-6">
                <label>Shop</label>
                <select name="shop" class="form-select col-12 col-md-6">
                    <option value="">Select shop</option>
                    <option>Karapakkam</option>
                    <option>Sholinganalur</option>
                    <option>Oorapakkam</option>
                </select>
                <p id="shop" class="text-danger">Shop Required</p>
            </div>
        </div>
        <div class="row mb-3">
            <div class="form-group col-12 col-md-6">
                <label>Total</label>
                <input name="total" type="text" class="form-control">
                <p id="total" class="text-danger">Total Required</p>
            </div>
            <div class="form-group col-12 col-md-6">
                <label>Status</label>
                <select name="status" type="date" class="form-select col-12 col-md-6">
                    <option>Pending</option>
                    <option>successful</option>
                    <option>rejected</option>
                </select>
                <p id="status" class="text-danger">Status Required</p>
            </div>
        </div>
        <div>
            <button class="btn btn-brand">Save</button>
            <button type="button" class="btn" onclick="resetForm()">resert</button>
        </div>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const form = document.querySelector("form")
        const id = document.getElementById('id')
        const orders = JSON.parse(localStorage.getItem('orders')) || []
        let uid = JSON.parse(localStorage.getItem('uid')) || 0

        id.value = uid + 1
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const formdata = new FormData(form);
            const data = Object.fromEntries(formdata.entries());
            if (validate(data)) {
                console.log('hitting')
                data.id = uid + 1
                uid += 1
                orders.push(data)
                localStorage.setItem('uid', uid)
                localStorage.setItem('orders', JSON.stringify(orders))
                window.location.href = '/table.html'
                resetForm()
            }
        })

        function validate(data) {
            const errors = document.querySelectorAll('form p')
            console.log(errors)
            errors.forEach(err => err.style.display = 'none');

            let legit = true;

            for (let feild in data) {
                if (data[feild] === "") {
                    legit = false
                    console.log(feild)
                    errors.forEach(err => err.id === feild ? err.style.display = 'block' : "")
                }
            }
            return legit
        }

        function resetForm() {
            errors.forEach(err => err.style.display = 'none');
            form.reset()
        }

    </script>
</body>

</html>
