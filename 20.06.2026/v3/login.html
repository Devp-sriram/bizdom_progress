<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./common.css">
    <style>
        body{
               background: radial-gradient(circle at 5% 95%, var(--bs-brand) 0%, transparent 20%), radial-gradient(circle at 95% 5%, var(--bs-brand) 0%, transparent 20%);
        }
        form p {
            display: none;
        }
    </style>
    <title>Document</title>
</head>

<body class="row px-2">
    <div class="col-12 col-md-6 col-lg-4 my-auto border rounded-5 mx-auto">
        <form class="form p-2 h-100">
            <h3 class="text-center">Login</h3>
            <div class="from-group mb-3">
                <label class="from-label">Email</label>
                <input name='email' type="email" class="form-control" />
                <p id="email" class="text-danger">Email Required</p>
            </div>
            <div class="from-group mb-3">
                <label class="from-label">Password</label>
                <input name='password' class="form-control" type="password" />
                <p id="password" class="text-danger">Password Required</p>
            </div>
            <button class="btn btn-brand mb-3 w-100">Login</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const form = document.querySelector('form')
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(form)
            const creds = Object.fromEntries(formData.entries())
            
            if (validate(creds)) {
                localStorage.setItem('loggedIn', JSON.stringify(creds))
                window.location.href = '/index.html'
            }
        })
        
        function validate(data) {
            const errors = document.querySelectorAll('form p')
            errors.forEach(err => err.style.display = 'none');
            
            let legit = true;
            
            for (let feild in data) {
                if (data[feild] === "") {
                    legit = false
                    errors.forEach(err => err.id === feild ? err.style.display = 'block' : "")
                }
            }
            return legit
        }
    </script>
</body>

</html>
